<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通知</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; cursor: pointer; }

  /* ====== 全屏模式 ====== */
  body.fullscreen {
    background: #000;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  body.fullscreen .container {
    text-align: center; padding: 60px 80px;
    animation: fadeIn 0.6s ease-out;
    width: 100%;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }
  body.fullscreen p.message {
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 700; color: #fff; line-height: 1.4; white-space: pre-wrap;
    margin: 0 auto 48px; text-align: center;
  }
  body.fullscreen .close-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 40px; border-radius: 16px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: #e2e8f0; font-size: 1.1rem; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  body.fullscreen .close-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }
  body.fullscreen .hint {
    color: rgba(148,163,184,0.6); font-size: 0.85rem; margin-top: 20px;
  }
  /* 全屏模式图片 */
  body.fullscreen .images-row {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    margin: 0 auto 32px;
  }
  body.fullscreen .images-row img {
    max-height: 400px; max-width: 100%; border-radius: 12px; object-fit: contain;
  }

  /* 紧急程度背景 */
  body.urgency-important.fullscreen { background: #1a0f00; }
  body.urgency-important p.message { color: #fbbf24; }
  body.urgency-urgent.fullscreen { background: #1a0000; animation: bgPulse 1.2s ease-in-out infinite; }
  @keyframes bgPulse {
    0%, 100% { background: #1a0000; }
    50% { background: #2a0505; }
  }
  body.urgency-urgent p.message {
    color: #fca5a5; font-weight: 800;
    text-shadow: 0 0 30px rgba(239,68,68,0.4);
  }

  /* ====== 顶部通知模式 ====== */
  body.top {
    background: #000;
    animation: slideDown 0.4s cubic-bezier(0.16,1,0.3,1);
    user-select: none;
  }
  body.urgency-important.top { background: #1a0f00; }
  body.urgency-urgent.top { background: #1a0000; }
  @keyframes slideDown {
    from { transform: translateY(-100%); }
    to { transform: translateY(0); }
  }
  body.top .top-container {
    display: flex; align-items: center; gap: 24px;
    width: 100%; height: 100%; padding: 16px 32px;
  }
  body.top .top-content { flex: 1; min-width: 0; }
  body.top .top-msg {
    font-size: clamp(1.5rem, 3vw, 2.5rem);
    font-weight: 700; color: #fff; line-height: 1.35;
    white-space: pre-wrap;
  }
  body.top .top-close {
    flex-shrink: 0; width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,0.08); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #94a3b8; transition: background 0.15s;
    align-self: flex-start; margin-top: 4px;
  }
  body.top .top-close:hover { background: rgba(255,255,255,0.15); color: #e2e8f0; }
  /* 顶部模式图片 */
  body.top .images-row {
    display: flex; gap: 10px; flex-shrink: 0; margin-left: auto; margin-right: 8px;
  }
  body.top .images-row img {
    height: 80px; border-radius: 8px; object-fit: contain;
  }

  /* ====== 倒计时进度条 ====== */
  .countdown-bar-wrap {
    position: absolute; bottom: 0; left: 0; right: 0; height: 8px;
    background: rgba(255,255,255,0.08);
  }
  .countdown-bar {
    height: 100%; border-radius: 0 4px 4px 0;
    background: rgba(255,255,255,0.5);
    animation: shrink var(--duration-ms) linear forwards;
  }
  body.urgency-important .countdown-bar { background: rgba(245,158,11,0.7); }
  body.urgency-urgent .countdown-bar { background: rgba(239,68,68,0.8); }
  @keyframes shrink { from { width: 100%; } to { width: 0%; } }

  /* 倒计时数字 */
  .countdown-timer {
    position: absolute; bottom: 16px; right: 24px;
    font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.4);
    font-variant-numeric: tabular-nums; font-family: monospace;
  }

  .hide { display: none !important; }
</style>
</head>
<body class="fullscreen">

  <!-- 全屏模式 -->
  <div id="fullscreen-view">
    <div class="container">
      <p class="message" id="fs-message"></p>
      <div class="images-row" id="fs-images"></div>
      <button class="close-btn" onclick="event.stopPropagation(); closeWindow()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
        点击关闭
      </button>
      <p class="hint" id="fs-hint"></p>
    </div>
  </div>

  <!-- 顶部通知模式 -->
  <div id="top-view" class="hide">
    <div class="top-container">
      <div class="top-content">
        <div class="top-msg" id="top-message"></div>
      </div>
      <div class="images-row" id="top-images"></div>
      <button class="top-close" onclick="event.stopPropagation(); closeWindow()" title="关闭">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

  <!-- 倒计时进度条 + 数字 -->
  <div class="countdown-bar-wrap" id="progress-wrap"><div class="countdown-bar" id="progress-bar"></div></div>
  <div class="countdown-timer" id="countdown-timer"></div>

  <script>
    var params = new URLSearchParams(location.search)
    var mode = params.get('mode') || 'fullscreen'
    var message = params.get('message') || ''
    var duration = parseInt(params.get('duration'))
    var isPermanent = duration === 0
    if (!duration || duration <= 0) duration = (mode === 'top' ? 8 : 30)
    var realDuration = isPermanent ? 0 : duration
    var isTop = mode === 'top'
    var remaining = realDuration

    var urgency = params.get('urgency') || '普通'
    if (urgency === '重要') document.body.classList.add('urgency-important')
    else if (urgency === '紧急') document.body.classList.add('urgency-urgent')

    // 切换 body class
    if (isTop) {
      document.body.classList.remove('fullscreen')
      document.body.classList.add('top')
    }

    // 初始化内容
    if (isPermanent) {
      document.getElementById('progress-wrap').style.display = 'none'
      document.getElementById('countdown-timer').style.display = 'none'
    }

    if (isTop) {
      document.getElementById('fullscreen-view').classList.add('hide')
      document.getElementById('top-view').classList.remove('hide')
      document.getElementById('top-message').textContent = message
    } else {
      document.getElementById('fs-message').textContent = message
      document.getElementById('fs-hint').textContent = '点击任意位置关闭 · 按 Esc 关闭'
    }

    // 显示图片（由 Electron 主进程注入 window.__notifyImages 后调用）
    function updateImages() {
      var images = window.__notifyImages || []
      if (!images || !images.length) return
      var container = document.getElementById(isTop ? 'top-images' : 'fs-images')
      if (!container) return
      container.innerHTML = images.map(function(src) {
        return '<img src="' + src + '" alt="通知图片" />'
      }).join('')
      container.classList.remove('hide')
    }

    // 倒计时数字更新
    if (!isPermanent) {
      document.getElementById('progress-bar').style.setProperty('--duration-ms', realDuration * 1000 + 'ms')
      document.getElementById('countdown-timer').textContent = realDuration + 's'
      var countdownInterval = setInterval(function() {
        remaining--
        if (remaining <= 0) { clearInterval(countdownInterval); return }
        document.getElementById('countdown-timer').textContent = remaining + 's'
      }, 1000)
    }

    function closeWindow() { try { window.close() } catch(e) {} }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeWindow() })
    if (!isPermanent) setTimeout(closeWindow, realDuration * 1000)
  </script>
</body>
</html>
