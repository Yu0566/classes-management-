<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>通知</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body.fullscreen {
    background: #000;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  body.fullscreen .container {
    text-align: center; padding: 60px 80px;
    animation: fadeIn 0.6s ease-out;
    width: 100%;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }
  body.fullscreen p.message {
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 700; color: #fff; line-height: 1.4; white-space: pre-wrap;
    margin: 0 auto 32px; text-align: center;
  }

  /* 确认区域 */
  .confirm-area {
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    margin-top: 20px;
  }
  .name-buttons {
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
  }
  .name-btn {
    padding: 14px 32px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08); color: #fff; font-size: 1.2rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
    min-width: 90px; text-align: center;
  }
  .name-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.4); transform: scale(1.04); }
  .name-btn.confirmed { background: #22c55e; border-color: #22c55e; color: #fff; cursor: default; transform: none; }
  .name-btn.confirmed:hover { background: #22c55e; transform: none; }

  .confirm-any-btn {
    padding: 14px 40px; border-radius: 16px; border: 2px solid rgba(255,255,255,0.25);
    background: rgba(34,197,94,0.15); color: #4ade80; font-size: 1.2rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .confirm-any-btn:hover { background: rgba(34,197,94,0.25); border-color: rgba(34,197,94,0.5); }
  .confirm-any-btn.confirmed { background: #22c55e; color: #fff; cursor: default; }

  .confirm-msg { font-size: 0.9rem; color: rgba(255,255,255,0.5); }

  /* 关闭按钮 */
  body.fullscreen .close-row {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  }
  body.fullscreen .close-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 40px; border-radius: 16px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: #e2e8f0; font-size: 1.1rem; cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  body.fullscreen .close-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }
  body.fullscreen .hint {
    color: rgba(148,163,184,0.6); font-size: 0.85rem; margin-top: 20px;
  }
  body.fullscreen .images-row {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    margin: 0 auto 32px;
  }
  body.fullscreen .images-row img {
    max-height: 55vh; max-width: 90%; border-radius: 12px; object-fit: contain;
  }

  body.urgency-important.fullscreen { background: #1a0f00; }
  body.urgency-important p.message { color: #fbbf24; }
  body.urgency-urgent.fullscreen { background: #1a0000; animation: bgPulse 1.2s ease-in-out infinite; }
  @keyframes bgPulse {
    0%, 100% { background: #1a0000; }
    50% { background: #2a0505; }
  }
  body.urgency-urgent p.message {
    color: #fca5a5; font-weight: 800;
    text-shadow: 0 0 30px rgba(239,68,68,0.4);
  }

  body.urgency-important .name-btn { border-color: rgba(251,191,36,0.3); }
  body.urgency-important .name-btn:hover { border-color: rgba(251,191,36,0.5); }
  body.urgency-urgent .name-btn { border-color: rgba(239,68,68,0.3); }
  body.urgency-urgent .name-btn:hover { border-color: rgba(239,68,68,0.5); }

  /* 顶部模式 */
  body.top {
    background: #000;
    animation: slideDown 0.4s cubic-bezier(0.16,1,0.3,1);
    user-select: none;
  }
  body.urgency-important.top { background: #1a0f00; }
  body.urgency-urgent.top { background: #1a0000; }
  @keyframes slideDown {
    from { transform: translateY(-100%); }
    to { transform: translateY(0); }
  }
  body.top .top-container {
    display: flex; align-items: center; gap: 24px;
    width: 100%; height: 100%; padding: 16px 32px;
  }
  body.top .top-content { flex: 1; min-width: 0; }
  body.top .top-msg {
    font-size: clamp(1.2rem, 2.5vw, 2rem);
    font-weight: 700; color: #fff; line-height: 1.35;
    white-space: pre-wrap;
  }
  body.top .top-confirm { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  body.top .name-btn {
    padding: 8px 20px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08); color: #fff; font-size: 0.95rem;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  body.top .name-btn:hover { background: rgba(255,255,255,0.18); }
  body.top .name-btn.confirmed { background: #22c55e; border-color: #22c55e; }
  body.top .confirm-any-btn {
    padding: 8px 24px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.25);
    background: rgba(34,197,94,0.15); color: #4ade80; font-size: 0.95rem;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  body.top .confirm-any-btn:hover { background: rgba(34,197,94,0.25); }
  body.top .confirm-any-btn.confirmed { background: #22c55e; color: #fff; cursor: default; }
  body.top .top-close {
    flex-shrink: 0; width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,0.08); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #94a3b8; transition: background 0.15s;
    align-self: flex-start; margin-top: 4px;
  }
  body.top .top-close:hover { background: rgba(255,255,255,0.15); color: #e2e8f0; }
  body.top .images-row {
    display: flex; gap: 10px; flex-shrink: 0; margin-left: auto; margin-right: 8px;
  }
  body.top .images-row img {
    max-height: 22vh; max-width: 90%; border-radius: 8px; object-fit: contain;
  }

  .countdown-bar-wrap {
    position: absolute; bottom: 0; left: 0; right: 0; height: 8px;
    background: rgba(255,255,255,0.08);
  }
  .countdown-bar {
    height: 100%; border-radius: 0 4px 4px 0;
    background: rgba(255,255,255,0.5);
    animation: shrink var(--duration-ms) linear forwards;
  }
  body.urgency-important .countdown-bar { background: rgba(245,158,11,0.7); }
  body.urgency-urgent .countdown-bar { background: rgba(239,68,68,0.8); }
  @keyframes shrink { from { width: 100%; } to { width: 0%; } }

  .countdown-timer {
    position: absolute; bottom: 16px; right: 24px;
    font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.4);
    font-variant-numeric: tabular-nums; font-family: monospace;
  }

  .hide { display: none !important; }
</style>
</head>
<body class="fullscreen">

  <div id="fullscreen-view">
    <div class="container">
      <p class="message" id="fs-message"></p>
      <div class="images-row" id="fs-images"></div>

      <!-- 确认区域：specific 模式显示名按钮 -->
      <div class="confirm-area hide" id="fs-confirm">
        <div class="name-buttons" id="fs-name-buttons"></div>
        <button class="confirm-any-btn hide" id="fs-confirm-any-btn" onclick="confirmAny()">我已收到 ✓</button>
        <p class="confirm-msg" id="fs-confirm-msg"></p>
      </div>

      <div class="close-row">
        <button class="close-btn" onclick="event.stopPropagation(); closeWindow()">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          点击关闭
        </button>
      </div>
      <p class="hint" id="fs-hint"></p>
    </div>
  </div>

  <div id="top-view" class="hide">
    <div class="top-container">
      <div class="top-content">
        <div class="top-msg" id="top-message"></div>
      </div>
      <div class="top-confirm hide" id="top-confirm">
        <div class="name-buttons" id="top-name-buttons" style="flex-wrap:nowrap"></div>
        <button class="confirm-any-btn hide" id="top-confirm-any-btn" onclick="confirmAny()">已收到</button>
      </div>
      <div class="images-row" id="top-images"></div>
      <button class="top-close" onclick="event.stopPropagation(); closeWindow()" title="关闭">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="countdown-bar-wrap" id="progress-wrap"><div class="countdown-bar" id="progress-bar"></div></div>
  <div class="countdown-timer" id="countdown-timer"></div>

  <script>
    var params = new URLSearchParams(location.search)
    var nid = params.get('id') || ''
    var mode = params.get('mode') || 'fullscreen'
    var message = params.get('message') || ''
    var duration = parseInt(params.get('duration'))
    var isPermanent = duration === 0
    if (!duration || duration <= 0) duration = (mode === 'top' ? 8 : 30)
    var realDuration = isPermanent ? 0 : duration
    var isTop = mode === 'top'
    var confirmMode = params.get('confirm_mode') || 'none'
    var confirmStudents = (params.get('confirm_students') || '').split(',').filter(Boolean)
    var lanPort = parseInt(params.get('lan_port')) || 3456
    var confirmedName = null

    var urgency = params.get('urgency') || '普通'
    if (urgency === '重要') document.body.classList.add('urgency-important')
    else if (urgency === '紧急') document.body.classList.add('urgency-urgent')

    if (isTop) {
      document.body.classList.remove('fullscreen')
      document.body.classList.add('top')
    }

    if (isPermanent) {
      document.getElementById('progress-wrap').style.display = 'none'
      document.getElementById('countdown-timer').style.display = 'none'
    }

    if (isTop) {
      document.getElementById('fullscreen-view').classList.add('hide')
      document.getElementById('top-view').classList.remove('hide')
      document.getElementById('top-message').textContent = message
    } else {
      document.getElementById('fs-message').textContent = message
    }

    // 确认功能：根据模式渲染不同 UI
    var msgEl = document.getElementById(isTop ? 'fs-confirm-msg' : 'fs-confirm-msg')

    if (confirmMode === 'specific' && confirmStudents.length > 0) {
      // 指定学生模式：显示名按钮
      var confirmArea = document.getElementById(isTop ? 'top-confirm' : 'fs-confirm')
      var buttonsContainer = document.getElementById(isTop ? 'top-name-buttons' : 'fs-name-buttons')
      confirmArea.classList.remove('hide')

      confirmStudents.forEach(function(name) {
        var btn = document.createElement('button')
        btn.className = 'name-btn'
        btn.textContent = name
        btn.onclick = function() { confirmName(name, btn) }
        buttonsContainer.appendChild(btn)
      })
    } else if (confirmMode === 'any') {
      // 任何人确认模式：显示单个确认按钮
      var confirmArea = document.getElementById(isTop ? 'top-confirm' : 'fs-confirm')
      var anyBtn = document.getElementById(isTop ? 'top-confirm-any-btn' : 'fs-confirm-any-btn')
      confirmArea.classList.remove('hide')
      anyBtn.classList.remove('hide')
    }

    function confirmName(name, btn) {
      if (confirmedName) return
      fetch('http://localhost:' + lanPort + '/api/notify/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notification_id: nid, student_name: name })
      })
      .then(function(r) { return r.json() })
      .then(function(d) {
        if (d.success) {
          confirmedName = name
          btn.classList.add('confirmed')
          btn.textContent = name + ' ✓'
          var msg = document.getElementById(isTop ? 'fs-confirm-msg' : 'fs-confirm-msg')
          msg.textContent = '确认成功！'
        } else {
          var msg = document.getElementById(isTop ? 'fs-confirm-msg' : 'fs-confirm-msg')
          msg.textContent = d.message || '确认失败'
        }
      })
      .catch(function(e) {
        var msg = document.getElementById(isTop ? 'fs-confirm-msg' : 'fs-confirm-msg')
        msg.textContent = '网络错误，请重试'
      })
    }

    function confirmAny() {
      if (confirmedName) return
      var anyBtn = document.getElementById(isTop ? 'top-confirm-any-btn' : 'fs-confirm-any-btn')
      fetch('http://localhost:' + lanPort + '/api/notify/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notification_id: nid, student_name: '匿名' })
      })
      .then(function(r) { return r.json() })
      .then(function(d) {
        if (d.success) {
          confirmedName = '匿名'
          anyBtn.textContent = '已确认 ✓'
          anyBtn.classList.add('confirmed')
        }
      })
      .catch(function(e) {})
    }

    function updateImages() {
      var images = window.__notifyImages || []
      if (!images || !images.length) return
      var container = document.getElementById(isTop ? 'top-images' : 'fs-images')
      if (!container) return
      container.innerHTML = images.map(function(src) {
        return '<img src="' + src + '" alt="通知图片" />'
      }).join('')
      container.classList.remove('hide')
    }

    if (!isPermanent) {
      document.getElementById('progress-bar').style.setProperty('--duration-ms', realDuration * 1000 + 'ms')
      document.getElementById('countdown-timer').textContent = realDuration + 's'
      var remaining = realDuration
      var countdownInterval = setInterval(function() {
        remaining--
        if (remaining <= 0) { clearInterval(countdownInterval); return }
        document.getElementById('countdown-timer').textContent = remaining + 's'
      }, 1000)
    }

    function closeWindow() { try { window.close() } catch(e) {} }
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeWindow() })
    if (!isPermanent && confirmMode === 'none') setTimeout(closeWindow, realDuration * 1000)

    window.confirmAny = confirmAny
    window.confirmName = confirmName
  </script>
</body>
</html>
