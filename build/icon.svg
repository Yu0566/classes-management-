<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185"/>
      <stop offset="100%" style="stop-color:#be123c"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="120" ry="120" fill="url(#bg)"/>

  <!-- Pages of open book (white) -->
  <g transform="translate(256,288)">
    <!-- Left page -->
    <path d="M 0,4 C -100,-24 -180,24 -192,140 L -192,220 C -180,96 -100,48 0,76 Z"
          fill="#fff" opacity="0.92"/>
    <!-- Right page -->
    <path d="M 0,4 C 100,-24 180,24 192,140 L 192,220 C 180,96 100,48 0,76 Z"
          fill="#fff" opacity="0.96"/>
    <!-- Center fold -->
    <line x1="0" y1="0" x2="0" y2="80" stroke="#e11d48" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Subtle decorative rings -->
  <circle cx="256" cy="288" r="180" fill="none" stroke="#fff" stroke-width="2" opacity="0.1"/>
  <circle cx="256" cy="288" r="200" fill="none" stroke="#fff" stroke-width="1" opacity="0.06"/>
</svg>
